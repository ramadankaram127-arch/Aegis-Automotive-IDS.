<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | Predictive Cyber Security</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: sans-serif; padding: 20px; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .card { border: 1px solid #00ff41; padding: 15px; background: rgba(0, 255, 65, 0.05); border-radius: 5px; }
        .status-box { font-size: 20px; font-weight: bold; padding: 15px; text-align: center; border: 1px solid #00ff41; margin-bottom: 20px; }
        .btn-simulate { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #warning-msg { display: none; background: #ff4444; color: white; padding: 15px; text-align: center; font-weight: bold; margin-top: 15px; animation: blink 0.8s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">🛡️ AEGIS v1.0</h2>
        <span>Predictive Engine: ACTIVE</span>
    </div>
    <div class="status-box" id="main-status">SYSTEM STATUS: SECURE</div>
    <div class="grid">
        <div class="card"><h4>CAN-BUS TRAFFIC</h4><canvas id="trafficChart"></canvas></div>
        <div class="card"><h4>THREAT PROBABILITY</h4><canvas id="threatChart"></canvas></div>
    </div>
    <div id="warning-msg">CRITICAL ALERT: MALICIOUS INJECTION DETECTED</div>
    <button class="btn-simulate" onclick="startAttack()">SIMULATE INTRUSION</button>
    <script>
        const ctxTraffic = document.getElementById('trafficChart').getContext('2d');
        const ctxThreat = document.getElementById('threatChart').getContext('2d');
        let trafficData = Array(20).fill(0);
        let trafficChart = new Chart(ctxTraffic, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ label: 'Packets/ms', data: trafficData, borderColor: '#00ff41', tension: 0.4 }] },
            options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } }, animation: false }
        });
        let threatChart = new Chart(ctxThreat, {
            type: 'doughnut',
            data: { labels: ['Safe', 'Threat'], datasets: [{ data: [100, 0], backgroundColor: ['#00ff41', '#222'] }] },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
        setInterval(() => {
            trafficData.shift();
            trafficData.push(Math.floor(Math.random() * 40) + 20);
            trafficChart.update();
        }, 300);
        function startAttack() {
            document.getElementById('main-status').innerText = "SYSTEM STATUS: BREACHED";
            document.getElementById('main-status').style.color = "#ff4444";
            document.getElementById('warning-msg').style.display = "block";
            threatChart.data.datasets[0].data = [15, 85];
            threatChart.data.datasets[0].backgroundColor = ['#222', '#ff4444'];
            threatChart.update();
        }
    </script>
</body>
</html>
